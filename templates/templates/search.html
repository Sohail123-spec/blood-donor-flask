<!DOCTYPE html>
<html>
<head>
    <title>Search Donor</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

</head>

<body class="bg-light">
{% include "navbar.html" %}
<div class="container mt-5">

    <h2 class="text-center text-success">
        Search Blood Donor
    </h2>

    <!-- SEARCH FORM -->

    <form method="POST" class="mt-4">

        <div class="mb-3">
            <label>Blood Group</label>

            <select name="blood" class="form-control">

                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>O+</option>
                <option>O-</option>
                <option>AB+</option>
                <option>AB-</option>

            </select>
        </div>


        <div class="mb-3">
            <label>City</label>
            <input type="text" name="city" class="form-control">
        </div>


        <button class="btn btn-primary">
            Search
        </button>

        <a href="/" class="btn btn-secondary">
            Home
        </a>

    </form>


    <hr>


    <!-- SHOW DONORS -->

    <h4>Available Donors</h4>

    <table class="table table-bordered">

        <tr>
           <th>Name</th>
           <th>Blood</th>
           <th>City</th>
           <th>Phone</th>
           <th>Status</th>
        </tr>

        {% for d in donors %}

        <tr>
            <td>{{ d[1] }}</td>
            <td>{{ d[2] }}</td>
            <td>{{ d[3] }}</td>
            <td>{{ d[4] }}</td>
            <td>{{ d[7] }}</td>
        </tr>

        {% endfor %}

    </table>


</div>

</body>
</html>
